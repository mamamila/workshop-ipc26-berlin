services:
  parrot-refactoring:
    build: .
    container_name: ipc26-parrot
    command: sh -c "composer install --no-interaction && tail -f /dev/null"
    volumes:
      - .:/srv/workshop-ipc26-berlin/refactoring/parrot:delegated
    environment:
      XDEBUG_MODE: debug
      XDEBUG_SESSION: PHPSTORM
